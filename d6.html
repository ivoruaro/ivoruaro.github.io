<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lancio Dado</title>

  <style>
    body {
      margin: 0;
      height: 100vh;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      background: #1e293b;
      font-family: Arial, sans-serif;
      color: white;
    }

    .dice {
      width: 140px;
      height: 140px;

      background: white;
      border-radius: 20px;

      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);

      padding: 15px;
      box-sizing: border-box;

      box-shadow:
        0 10px 25px rgba(0,0,0,0.4);

      margin-bottom: 30px;

      transform: scale(1);
      transition: transform 0.5s ease;
    }

    .dice.hide {
      transform: scale(0);
    }

    .dot {
      width: 22px;
      height: 22px;

      background: #111;
      border-radius: 50%;

      justify-self: center;
      align-self: center;

      opacity: 0;

      transition: opacity 0.1s;
    }

    .show {
      opacity: 1;
    }

  </style>
</head>

<body>

  <div class="dice" id="dice">
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div>
    <div class="dot" id="d5"></div>
    <div class="dot" id="d6"></div>
    <div class="dot" id="d7"></div>
    <div class="dot" id="d8"></div>
    <div class="dot" id="d9"></div>
  </div>

  <script>
    const patterns = {
      1: [5],
      2: [1, 9],
      3: [1, 5, 9],
      4: [1, 3, 7, 9],
      5: [1, 3, 5, 7, 9],
      6: [1, 3, 4, 6, 7, 9]
    };

    function clearDice() {
      for (let i = 1; i <= 9; i++) {
        document
          .getElementById("d" + i)
          .classList.remove("show");
      }
    }

    function showFace(number) {
      clearDice();

      patterns[number].forEach(pos => {
        document
          .getElementById("d" + pos)
          .classList.add("show");
      });
    }

    function rollDice() {
      const dice = document.getElementById("dice");

      dice.classList.add("hide");

      setTimeout(() => {
        const random = Math.floor(Math.random() * 6) + 1;

        showFace(random);

        dice.classList.remove("hide");
      }, 500);
    }

    showFace(1);

    dice.addEventListener("click", rollDice);
  </script>

</body>
</html>
